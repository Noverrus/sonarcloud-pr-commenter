name: SonarCloud Human-Readable PR Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar-human-bot:
    name: SonarCloud Friendly Summary
    runs-on: ubuntu-latest
    
    # SECURITY: Prevent running on external forks
    if: github.event.pull_request.head.repo.full_name == github.repository
    
    steps:
      # Optional: Wait for SonarCloud if running Automatic Analysis
      - name: Wait for SonarCloud Analysis
        run: sleep 60
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run PR Bot via NPX
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_KEY: 'your_project_key_here'
        # Runs the bot CLI directly from NPM
        run: npx sonarcloud-pr-commenter
